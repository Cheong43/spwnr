name: Sync Spwnr Registry Submodule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Update submodule pointer
        run: |
          git submodule sync --recursive
          git submodule update --init --remote -- vendor/spwnr-registry

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet --exit-code -- vendor/spwnr-registry; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/sync-spwnr-registry
          commit-message: 'chore: sync spwnr-registry submodule'
          title: 'chore: sync spwnr-registry submodule'
          body: |
            This PR updates `vendor/spwnr-registry` to the latest upstream commit.

            Generated by the scheduled submodule sync workflow.
          add-paths: |
            vendor/spwnr-registry
