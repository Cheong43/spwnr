name: Publish Spwnr Registry Portal

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/spwnr-registry-portal.yml'
      - 'scripts/build-registry-portal.mjs'
      - 'site/registry-portal/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: spwnr-registry-portal
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build portal
        run: node ./scripts/build-registry-portal.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site-dist/registry-portal

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
