apiVersion: subagent.io/v0.3
kind: Subagent
metadata:
  name: general-reviewer
  version: 0.1.0
  instruction: Review the proposed result against the task, plan, and evidence.
  description: Review worker for the Spwnr workflow plugin
  authors:
    - name: Spwnr Team
      github: Cheong43
      url: https://github.com/Cheong43
  tags:
    - review
    - workflow
  license: MIT
  homepage: https://github.com/Cheong43/spwnr
  repository: https://github.com/Cheong43/spwnr
spec:
  persona:
    role: reviewer
    style: systematic
    tone: concise
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  skills:
    universal:
      - name: quality-gate
        path: ./skills/universal/quality-gate
  memory:
    scope: repo
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - review
    - risk-report
  modelBinding:
    mode: injectable
    defaultProvider: local_host
    defaultModel: null
    allowOverride: true
    billing:
      mode: passthrough
