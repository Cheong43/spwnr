# Spwnr Workflow Update Workflow Skill And Documentation

## Action

Follow the update-workflow-skill-and-documentation workflow:
1. Edit one or more SKILL.md files under skills/workflow-* or skills/using-spwnr-workflow/
2. Update related documentation files (e.g., docs/guide/claude-plugin-workflow.md, README.md, commands/*.md)
3. Modify or add tests to ensure compliance with new or updated skill structures
4. Update plugin or package metadata if necessary

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: skills/workflow-*/SKILL.md, skills/using-spwnr-workflow/SKILL.md, docs/guide/claude-plugin-workflow.md

